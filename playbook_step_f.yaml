---
- name: Cleanup Infrastructura si Utilizatori - Cerinta F
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    devops_user: "ansible_admin"
    deploy_dir: "/home/ansible_admin/docker-deployment"

  tasks:
    - name: 1. Oprirea si dezafectarea containerelor Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}"
        state: absent
      become: yes
      become_user: "{{ devops_user }}"
      # Implementam o plasa de siguranta: daca directorul sau fisierul YAML lipsesc,
      # task-ul nu va opri executia playbook-ului, ci va trece la stergerea utilizatorului.
      ignore_errors: yes

    - name: 2. Stergerea mediului de deployment (fisiere si directoare)
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: absent
      become: yes

    - name: 3. Eliminarea utilizatorului DevOps si curatarea directorului home
      ansible.builtin.user:
        name: "{{ devops_user }}"
        state: absent
        # Echivalentul comenzii 'userdel -r', elimina integral /home/ansible_admin
        remove: yes
      become: yes
